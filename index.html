<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Courier New', Courier, monospace;
  }

  /* ---- VIDEO BACKGROUND ---- */
  #bgVideo {
    position: fixed;
    top: 50%; left: 50%;
    min-width: 100%; min-height: 100%;
    width: auto; height: auto;
    transform: translate(-50%, -50%);
    z-index: 0;
    object-fit: cover;
    filter: brightness(0.55) saturate(1.3) contrast(1.1);
  }

  /* Dark overlay to keep mood */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
  }

  /* Red tint vignette */
  #vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(80,5,5,0.45) 100%);
    pointer-events: none;
  }

  /* ---- X CLOSE BUTTON ---- */
  #closeBtn {
    position: fixed;
    top: 22px;
    right: 26px;
    z-index: 100;
    width: 44px;
    height: 44px;
    border: 1.5px solid rgba(200,60,40,0.7);
    background: rgba(0,0,0,0.55);
    color: rgba(220,80,60,0.95);
    font-size: 22px;
    font-weight: 300;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    letter-spacing: 0;
  }
  #closeBtn:hover {
    background: rgba(160,20,10,0.65);
    border-color: rgba(255,100,80,0.9);
    color: #fff;
  }
  #closeBtn svg {
    width: 18px; height: 18px;
    stroke: currentColor;
    stroke-width: 1.8;
    fill: none;
    stroke-linecap: round;
  }

  /* ---- COUNTDOWN ---- */
  #countdown {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
    user-select: none;
  }

  #timer {
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(52px, 10vw, 100px);
    font-weight: 700;
    color: #c0392b;
    letter-spacing: 6px;
    line-height: 1;
    text-shadow:
      0 0 20px rgba(192,57,43,0.9),
      0 0 50px rgba(192,57,43,0.5),
      0 0 100px rgba(140,10,10,0.3);
    transition: color 0.5s;
  }

  #timer.critical {
    color: #ff2200;
    text-shadow:
      0 0 10px rgba(255,34,0,1),
      0 0 40px rgba(255,34,0,0.8),
      0 0 80px rgba(255,0,0,0.5);
    animation: critpulse 0.6s ease-in-out infinite;
  }

  @keyframes critpulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* ---- DEAD SCREEN ---- */
  #deadscreen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
    align-items: center;
    justify-content: center;
  }
  #deadscreen.show { display: flex; }

  /* ---- CANVAS PARTICLES (explosions overlay) ---- */
  #fxCanvas {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    width: 100%; height: 100%;
  }

</style>
</head>
<body>

<!-- VIDEO BACKGROUND — replace "background.mp4" with your video file -->
<video id="bgVideo" autoplay muted loop playsinline preload="auto">
  <source src="background.mp4" type="video/mp4">
  <!-- Fallback: dark solid if video missing -->
</video>

<div id="overlay"></div>
<div id="vignette"></div>

<!-- FX canvas for explosion particles -->
<canvas id="fxCanvas"></canvas>

<!-- X BUTTON — replace href="#" with your link -->
<a id="closeBtn" href="YOUR_LINK_HERE" target="_blank" rel="noopener" title="Leave">
  <svg viewBox="0 0 24 24"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg>
</a>

<!-- COUNTDOWN -->
<div id="countdown">
  <div id="timer">01:00:00</div>
</div>

<!-- DEAD SCREEN -->
<div id="deadscreen"></div>

<script>
(function () {

  // ---- CANVAS FX ----
  const canvas = document.getElementById('fxCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => canvas.width;
  const H = () => canvas.height;

  let explosions = [], fires = [], smoke = [], flak = [], bombs = [];

  function spawnExplosion(px, py) {
    const x = px !== undefined ? px : Math.random() * W();
    const y = py !== undefined ? py : H() * (0.3 + Math.random() * 0.5);
    explosions.push({
      x, y,
      r: 0,
      maxR: 35 + Math.random() * 70,
      life: 1.0,
      decay: 0.016 + Math.random() * 0.024,
      color: Math.random() < 0.5 ? [255, 140, 0] : [255, 60, 0]
    });
    fires.push({
      x, y,
      life: 1.0,
      decay: 0.003 + Math.random() * 0.004,
      size: 10 + Math.random() * 25
    });
    for (let i = 0; i < 6; i++) {
      smoke.push({
        x: x + (Math.random() - 0.5) * 30,
        y,
        vx: (Math.random() - 0.5) * 0.5,
        vy: -(0.3 + Math.random() * 0.7),
        life: 1.0,
        decay: 0.003 + Math.random() * 0.005,
        r: 10 + Math.random() * 22
      });
    }
  }

  function spawnBomb() {
    const tx = Math.random() * W();
    const ty = H() * (0.4 + Math.random() * 0.4);
    bombs.push({
      x: Math.random() * W(),
      y: 0,
      tx, ty,
      speed: 2.5 + Math.random() * 3.5,
      done: false
    });
  }

  function spawnFlak() {
    flak.push({
      x: Math.random() * W(),
      y: H() * (0.05 + Math.random() * 0.5),
      life: 1.0,
      decay: 0.04 + Math.random() * 0.05,
      r: 4 + Math.random() * 6
    });
  }

  // ---- TIMER ----
  const DURATION = 3600;
  let remaining = DURATION;
  let lastTick = Date.now();
  let dead = false;
  let t = 0;

  const timerEl = document.getElementById('timer');
  const deadEl  = document.getElementById('deadscreen');

  function fmt(s) {
    const h   = Math.floor(s / 3600);
    const m   = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  // ---- AUDIO ----
  let audioCtx = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const master = audioCtx.createGain();
    master.gain.value = 0.18;
    master.connect(audioCtx.destination);

    function drone(freq, detune, attack, sus) {
      const osc    = audioCtx.createOscillator();
      const g      = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 380 + Math.random() * 200;
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      osc.detune.value = detune;
      g.gain.setValueAtTime(0, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(sus, audioCtx.currentTime + attack);
      g.gain.linearRampToValueAtTime(sus * 0.65, audioCtx.currentTime + attack + 9);
      osc.connect(filter); filter.connect(g); g.connect(master);
      osc.start();
    }

    drone(55,  0,  3, 0.40);
    drone(55,  9,  4, 0.30);
    drone(82.4,-5, 5, 0.24);
    drone(110,  3, 6, 0.20);
    drone(41.2, 0, 2, 0.50);

    // Noise rumble
    const bufSize = audioCtx.sampleRate * 2;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 80;
    const rg = audioCtx.createGain(); rg.gain.value = 0.12;
    src.connect(lp); lp.connect(rg); rg.connect(master);
    src.start();

    // Bass thuds
    function thud() {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(80, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(18, audioCtx.currentTime + 0.65);
      g.gain.setValueAtTime(0.55, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.65);
      o.connect(g); g.connect(master);
      o.start(); o.stop(audioCtx.currentTime + 0.65);
      setTimeout(thud, 1400 + Math.random() * 3200);
    }
    setTimeout(thud, 1800);
  }

  document.body.addEventListener('click', initAudio, { once: true });
  setTimeout(() => { try { initAudio(); } catch(e) {} }, 600);

  // ---- SPAWN TIMING ----
  let nextBomb = 0, nextFlak = 0;

  // ---- MAIN LOOP ----
  function draw() {
    if (dead) return;

    const now = Date.now();
    const dt  = Math.min((now - lastTick) / 1000, 0.1);
    lastTick  = now;
    remaining = Math.max(0, remaining - dt);
    t += dt;

    const progress  = 1 - remaining / DURATION;
    const intensity = 0.1 + progress * 0.9;

    if (remaining <= 0 && !dead) {
      dead = true;
      deadEl.classList.add('show');
      return;
    }

    const cw = canvas.width;
    const ch = canvas.height;
    ctx.clearRect(0, 0, cw, ch);

    // Smoke
    smoke.forEach(s => {
      s.x += s.vx; s.y += s.vy;
      s.life -= s.decay; s.r += 0.4;
      if (s.life > 0) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(20,12,10,${s.life * 0.45})`;
        ctx.fill();
      }
    });
    smoke = smoke.filter(s => s.life > 0);

    // Fires
    fires.forEach(f => {
      f.life -= f.decay;
      if (f.life > 0) {
        const sz  = f.size * (0.6 + Math.sin(t * 8 + f.x) * 0.4) * f.life;
        const gr  = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, sz);
        gr.addColorStop(0,   `rgba(255,225,60,${f.life * 0.9})`);
        gr.addColorStop(0.4, `rgba(255,90,0,${f.life * 0.7})`);
        gr.addColorStop(1,   `rgba(100,20,0,0)`);
        ctx.fillStyle = gr;
        ctx.beginPath();
        ctx.arc(f.x, f.y, sz, 0, Math.PI * 2);
        ctx.fill();
      }
    });
    fires = fires.filter(f => f.life > 0);

    // Explosions
    explosions.forEach(e => {
      e.r    += (e.maxR - e.r) * 0.13;
      e.life -= e.decay;
      if (e.life > 0) {
        const gr = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r);
        gr.addColorStop(0,   `rgba(255,255,200,${e.life})`);
        gr.addColorStop(0.3, `rgba(${e.color[0]},${e.color[1]},${e.color[2]},${e.life * 0.9})`);
        gr.addColorStop(0.7, `rgba(180,30,0,${e.life * 0.5})`);
        gr.addColorStop(1,   `rgba(80,10,0,0)`);
        ctx.fillStyle = gr;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
        ctx.fill();
      }
    });
    explosions = explosions.filter(e => e.life > 0);

    // Flak
    flak.forEach(f => {
      f.life -= f.decay;
      if (f.life > 0) {
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r * (1 - f.life + 0.5), 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,200,100,${f.life * 0.7})`;
        ctx.lineWidth   = 1;
        ctx.stroke();
      }
    });
    flak = flak.filter(f => f.life > 0);

    // Bombs
    bombs.forEach(b => {
      if (!b.done) {
        const dx   = b.tx - b.x;
        const dy   = b.ty - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < b.speed * 2) {
          b.done = true;
          spawnExplosion(b.tx, b.ty);
        } else {
          const nx = dx / dist * b.speed;
          const ny = dy / dist * b.speed;
          b.x += nx + Math.sin(t * 5) * 0.4;
          b.y += ny;
          ctx.fillStyle = 'rgba(230,210,160,0.88)';
          ctx.fillRect(b.x - 1, b.y - 3, 2, 6);
          ctx.beginPath();
          ctx.moveTo(b.x, b.y);
          ctx.lineTo(b.x - nx * 4, b.y - ny * 4);
          ctx.strokeStyle = 'rgba(255,140,40,0.4)';
          ctx.lineWidth   = 1;
          ctx.stroke();
        }
      }
    });
    bombs = bombs.filter(b => !b.done);

    // Spawn
    const freq = 2200 - intensity * 1800;
    if (now > nextBomb) {
      spawnBomb();
      if (intensity > 0.35) spawnBomb();
      if (intensity > 0.65) spawnBomb();
      nextBomb = now + freq * (0.5 + Math.random());
    }
    if (now > nextFlak) {
      spawnFlak();
      nextFlak = now + 350 + Math.random() * 750;
    }
    if (Math.random() < 0.002 + intensity * 0.006) {
      for (let i = 0; i < 3; i++) spawnExplosion();
    }

    // Screen flash
    if (Math.random() < 0.001 + intensity * 0.003) {
      ctx.fillStyle = `rgba(255,160,80,${0.04 + Math.random() * 0.08})`;
      ctx.fillRect(0, 0, cw, ch);
    }

    // Timer update
    timerEl.textContent = fmt(Math.ceil(remaining));
    if (remaining < 300) timerEl.classList.add('critical');

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);

})();
</script>
</body>
</html>
